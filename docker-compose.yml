version: '3.8'

services:
  bot:
    build: .
    container_name: svoy_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: python bot.py
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncio; from database import Database; asyncio.run(Database().connect())"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  admin:
    build: .
    container_name: svoy_admin
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5005:5005"
    volumes:
      - ./data:/app/data
    command: python admin_panel.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
