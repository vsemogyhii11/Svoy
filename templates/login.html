<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — СВОЙ Админ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1e40af;
            --secondary-color: #3b82f6;
            --accent-color: #60a5fa;
            --text-dark: #1e3a5f;
            --text-light: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Левая часть с фото */
        .hero-section {
            flex: 1;
            background: linear-gradient(135deg, rgba(30, 64, 175, 0.8) 0%, rgba(59, 130, 246, 0.6) 100%),
                        url('https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=1920&q=80') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            color: white;
            position: relative;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 50%, rgba(59, 130, 246, 0.4) 0%, transparent 60%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 500px;
        }

        .hero-shield {
            width: 120px;
            height: 140px;
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 30px rgba(59, 130, 246, 0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .hero-title {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .hero-subtitle {
            font-size: 18px;
            opacity: 0.9;
            line-height: 1.6;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .hero-features {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .hero-feature {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: left;
        }

        .hero-feature-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .hero-feature-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .hero-feature-desc {
            font-size: 12px;
            opacity: 0.8;
        }

        /* Правая часть - форма входа */
        .login-section {
            width: 500px;
            background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .login-card {
            background: white;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-icon {
            width: 60px;
            height: 70px;
            margin: 0 auto 20px;
        }

        .login-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: #64748b;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            color: var(--text-dark);
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
            background: white;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.1);
        }

        .form-input::placeholder {
            color: #94a3b8;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(30, 64, 175, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 64, 175, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .security-note {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e2e8f0;
            text-align: center;
        }

        .security-note-text {
            font-size: 12px;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Адаптивность */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
            }

            .hero-section {
                min-height: 40vh;
                padding: 40px 20px;
            }

            .hero-features {
                display: none;
            }

            .login-section {
                width: 100%;
                min-height: 60vh;
            }
        }
    </style>
</head>
<body>
    <!-- Левая часть с фото -->
    <div class="hero-section">
        <div class="hero-content">
            <!-- Щит SVG -->
            <svg class="hero-shield" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#1e40af"/>
                        <stop offset="100%" style="stop-color:#3b82f6"/>
                    </linearGradient>
                    <filter id="shieldGlow">
                        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                <path d="M50 5 L90 20 L90 60 Q90 95 50 115 Q10 95 10 60 L10 20 Z"
                      fill="url(#shieldGradient)"
                      stroke="#f0f9ff"
                      stroke-width="3"
                      filter="url(#shieldGlow)"/>
                <text x="50" y="72" text-anchor="middle" fill="white" font-size="42" font-weight="bold" font-family="Inter, sans-serif">С</text>
            </svg>

            <h1 class="hero-title">🛡 СВОЙ Админ</h1>
            <p class="hero-subtitle">Панель администратора системы защиты от мошенников</p>

            <div class="hero-features">
                <div class="hero-feature">
                    <div class="hero-feature-icon">📊</div>
                    <div class="hero-feature-title">Статистика</div>
                    <div class="hero-feature-desc">Отчёты и аналитика</div>
                </div>
                <div class="hero-feature">
                    <div class="hero-feature-icon">🔒</div>
                    <div class="hero-feature-title">Защита</div>
                    <div class="hero-feature-desc">ML и AI детекция</div>
                </div>
                <div class="hero-feature">
                    <div class="hero-feature-icon">👥</div>
                    <div class="hero-feature-title">Пользователи</div>
                    <div class="hero-feature-desc">Мониторинг активности</div>
                </div>
                <div class="hero-feature">
                    <div class="hero-feature-icon">⚡</div>
                    <div class="hero-feature-title">Real-time</div>
                    <div class="hero-feature-desc">Живые обновления</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Правая часть - форма входа -->
    <div class="login-section">
        <div class="login-card">
            <div class="login-header">
                <!-- Маленький щит -->
                <svg class="login-icon" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="loginShieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#1e40af"/>
                            <stop offset="100%" style="stop-color:#3b82f6"/>
                        </linearGradient>
                    </defs>
                    <path d="M50 5 L90 20 L90 60 Q90 95 50 115 Q10 95 10 60 L10 20 Z"
                          fill="url(#loginShieldGradient)"
                          stroke="#f0f9ff"
                          stroke-width="3"/>
                    <text x="50" y="72" text-anchor="middle" fill="white" font-size="42" font-weight="bold" font-family="Inter, sans-serif">С</text>
                </svg>

                <h2 class="login-title">Вход в панель</h2>
                <p class="login-subtitle">Введите пароль администратора</p>
            </div>

            <div class="error-message" id="error-message"></div>

            <form method="post" id="login-form">
                <div class="form-group">
                    <label class="form-label" for="password">🔒 Пароль</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Введите пароль"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="btn-submit">
                    Войти в панель →
                </button>
            </form>

            <div class="security-note">
                <div class="security-note-text">
                    🔒 Защищено HTTPS шифрованием
                </div>
            </div>
        </div>
    </div>

    <script>
        // Показ ошибок
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        
        if (error) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = '❌ ' + decodeURIComponent(error);
            errorEl.classList.add('show');
        }

        // Автофокус на поле пароля
        document.getElementById('password').focus();
    </script>
</body>
</html>
